<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检测中</title>
    <style>
        body {
            background: #f5f7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .progress-container {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status {
            font-size: 16px;
            color: #666;
            margin: 10px 0;
            line-height: 1.5;
        }
        .error {
            color: #e74c3c;
            margin-top: 20px;
            font-weight: bold;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <!-- 引入SocketIO客户端 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h2>视频检测中...</h2>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status" id="progressText">0% (0/0 帧)</div>
        <div class="error" id="error"></div>
    </div>

    <script>
        // ======================== 配置（完全匹配你的ngrok地址）========================
        const SOCKET_URL = "https://nonimperial-ladawn-ecalcarate.ngrok-free.dev";
        const RESULT_PAGE = "result.html";

        // 获取会话ID（同时支持session_id和session）
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id') || params.get('session');

        if (!sessionId) {
            document.getElementById('error').textContent = "无效请求，即将返回首页...";
            setTimeout(() => window.location.href = "index.html", 2000);
        }

        // ======================== 初始化SocketIO连接（彻底绕开CORS）========================
        const socket = io(SOCKET_URL, {
            transports: ['websocket'],
            cors: {
                origin: "*"
            }
        });

        // 连接成功
        socket.on('connect', () => {
            console.log('Socket连接成功');
            document.getElementById('error').textContent = '';
            // 加入对应会话房间
            socket.emit('join', { session_id: sessionId });
        });

        // 监听进度推送（后端主动发，前端被动收，完全不用轮询）
        socket.on('detection_progress', (data) => {
            if (data.session_id !== sessionId) return;

            const progress = data.progress || 0;
            const currentFrame = data.current_frame || 0;
            const totalFrames = data.total_frames || 0;
            const processedFrames = data.processed_frames || 0;

            // 更新进度条
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent =
                `${progress.toFixed(1)}% (${currentFrame}/${totalFrames} 帧，已分析 ${processedFrames} 帧)`;

            // 检测失败处理
            if (data.status === 'failed') {
                document.getElementById('error').textContent = "检测失败：" + (data.error || "未知错误");
                socket.disconnect();
            }

            // 检测完成，跳结果页
            if (progress >= 100 || data.status === 'completed') {
                socket.disconnect();
                window.location.href = `${RESULT_PAGE}?session_id=${sessionId}`;
            }
        });

        // 监听检测完成事件
        socket.on('detection_complete', (data) => {
            if (data.session_id !== sessionId) return;
            socket.disconnect();
            window.location.href = `${RESULT_PAGE}?session_id=${sessionId}`;
        });

        // 连接错误处理
        socket.on('connect_error', (err) => {
            console.error('Socket连接错误:', err);
            document.getElementById('error').textContent = "网络连接失败，请检查ngrok和后端服务";
        });

        // 断开连接处理
        socket.on('disconnect', () => {
            console.log('Socket断开连接');
        });
    </script>
</body>
</html>
