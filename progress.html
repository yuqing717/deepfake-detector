<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检测中</title>
    <style>
        body {
            background: #f5f7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .progress-container {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status {
            font-size: 16px;
            color: #666;
            margin: 10px 0;
            line-height: 1.5;
        }
        .error {
            color: #e74c3c;
            margin-top: 20px;
            font-weight: bold;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h2>视频检测中...</h2>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status" id="progressText">0% (0/0 帧)</div>
        <div class="error" id="error"></div>
    </div>

    <script>
        // ======================== 配置（与后端完全匹配）========================
        const API_BASE_URL = "https://nonimperial-ladawn-ecalcarate.ngrok-free.dev/api";
        const RESULT_PAGE = "result.html";

        // 🔥 关键修复：同时支持 session_id 和 session 两种参数名
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id') || params.get('session');

        if (!sessionId) {
            document.getElementById('error').textContent = "无效请求，即将返回首页...";
            setTimeout(() => window.location.href = "index.html", 2000);
        }

        // ======================== 稳定轮询进度（100%兼容修复后后端）========================
        async function getProgress() {
            try {
                const response = await fetch(`${API_BASE_URL}/progress/${sessionId}`, {
                    method: 'GET',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    mode: 'cors'
                });

                if (!response.ok) {
                    console.error('请求失败:', response.status);
                    return;
                }

                const data = await response.json();
                console.log('进度数据:', data);

                // 更新进度条
                const progress = data.progress || 0;
                const totalFrames = data.total_frames || 0;
                const processedFrames = data.processed_frames || 0;
                const currentFrame = data.current_frame || 0;

                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('progressText').textContent =
                    `${progress.toFixed(1)}% (${currentFrame}/${totalFrames} 帧，已分析 ${processedFrames} 帧)`;

                // 状态处理
                if (data.status === 'failed') {
                    document.getElementById('error').textContent = "检测失败：" + (data.error || "未知错误");
                    return;
                }

                // 检测完成 → 跳结果页
                if (progress >= 100 || data.status === 'completed') {
                    window.location.href = `${RESULT_PAGE}?session_id=${sessionId}`;
                }

            } catch (err) {
                console.error("轮询错误:", err);
                document.getElementById('error').textContent = "网络异常，重试中...";
            }
        }

        // 立即执行 + 定时轮询
        getProgress();
        setInterval(getProgress, 500);
    </script>
</body>
</html>
