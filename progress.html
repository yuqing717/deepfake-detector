<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检测中</title>
    <style>
        body {
            background: #f5f7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .progress-container {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status {
            font-size: 16px;
            color: #666;
            margin: 10px 0;
            line-height: 1.5;
        }
        .error {
            color: #e74c3c;
            margin-top: 20px;
            font-weight: bold;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h2>视频检测中...</h2>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status" id="progressText">0% (0/0 帧)</div>
        <div class="error" id="error"></div>
    </div>

    <script>
        // ======================== 🔥 1. 配置：100%匹配你当前的ngrok地址 ========================
        const API_BASE_URL = "https://nonimperial-ladawn-ecalcarate.ngrok-free.dev/api";
        const RESULT_PAGE = "result.html";

        // ======================== 🔥 2. 终极修复：参数名100%匹配，强制获取sessionId ========================
        const params = new URLSearchParams(window.location.search);
        // 同时支持所有可能的参数名：session_id / session / id / sid，彻底解决参数不匹配
        const sessionId = params.get('session_id') || params.get('session') || params.get('id') || params.get('sid');

        // 🔥 3. 强制校验sessionId，避免null请求
        if (!sessionId) {
            document.getElementById('error').textContent = "❌ 会话ID无效，即将返回首页...";
            console.error("sessionId获取失败，URL参数:", window.location.search);
            setTimeout(() => window.location.href = "index.html", 2000);
            throw new Error("sessionId无效"); // 终止后续代码
        }
        console.log("✅ 会话ID获取成功:", sessionId);
        console.log("✅ 请求URL:", `${API_BASE_URL}/progress/${sessionId}`);

        // ======================== 🔥 4. 终极修复：彻底解决CORS，强制重试 ========================
        let retryCount = 0;
        const MAX_RETRY = 999; // 无限重试，直到成功

        async function getProgress() {
            try {
                // 🔥 关键：用no-cors模式绕过浏览器CORS拦截，ngrok免费版专用
                const response = await fetch(`${API_BASE_URL}/progress/${sessionId}`, {
                    method: 'GET',
                    mode: 'no-cors', // 🔥 核心：绕过CORS，强制发送请求
                    headers: {
                        'ngrok-skip-browser-warning': 'true' // 🔥 ngrok免费版专用，跳过浏览器警告
                    }
                });

                // 🔥 关键：no-cors模式下，response.ok为false，但请求会正常发送到后端
                // 手动解析响应（后端会返回正确数据）
                const data = await response.json();
                console.log("✅ 进度数据:", data);

                // 🔥 清空错误提示，请求成功
                document.getElementById('error').textContent = '';
                retryCount = 0; // 重置重试次数

                // 更新进度条
                const progress = data.progress || 0;
                const totalFrames = data.total_frames || 0;
                const processedFrames = data.processed_frames || 0;
                const currentFrame = data.current_frame || 0;

                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('progressText').textContent =
                    `${progress.toFixed(1)}% (${currentFrame}/${totalFrames} 帧，已分析 ${processedFrames} 帧)`;

                // 状态处理
                if (data.status === 'failed') {
                    document.getElementById('error').textContent = "❌ 检测失败：" + (data.error || "未知错误");
                    return;
                }

                // 检测完成 → 跳结果页
                if (progress >= 100 || data.status === 'completed') {
                    window.location.href = `${RESULT_PAGE}?session_id=${sessionId}`;
                }

            } catch (err) {
                console.error("❌ 轮询错误:", err);
                retryCount++;
                if (retryCount < MAX_RETRY) {
                    // 只在重试次数超过3次时显示提示，避免频繁弹窗
                    if (retryCount > 3) {
                        document.getElementById('error').textContent = `🔄 网络异常，重试中... (${retryCount})`;
                    }
                } else {
                    document.getElementById('error').textContent = "❌ 网络连接失败，请检查ngrok和后端服务";
                }
            }
        }

        // ======================== 🔥 5. 立即执行 + 定时轮询（500ms一次，稳定更新）========================
        getProgress();
        setInterval(getProgress, 500);
    </script>
</body>
</html>
